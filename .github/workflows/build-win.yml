# Manual Windows build with Azure Trusted Signing.
# Trigger: GitHub Actions UI (workflow_dispatch)

name: Build Windows

on:
  workflow_dispatch:

concurrency:
  group: build-win
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    name: Build (Windows x64)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        run: npx tauri build --target x86_64-pc-windows-msvc

      - name: Sign Windows artifacts
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: golemancy
          certificate-profile-name: golemancy
          files-folder: src-tauri/target/x86_64-pc-windows-msvc/release/bundle
          files-folder-filter: exe,msi
          files-folder-depth: 5

      - name: Verify code signing
        shell: pwsh
        run: |
          $allValid = $true
          $files = Get-ChildItem "src-tauri/target/x86_64-pc-windows-msvc/release/bundle" -Recurse -Include *.exe,*.msi
          foreach ($file in $files) {
            Write-Host "Verifying: $($file.FullName)"
            $sig = Get-AuthenticodeSignature $file.FullName
            Write-Host "  Status: $($sig.Status)"
            Write-Host "  Signer: $($sig.SignerCertificate.Subject)"
            if ($sig.Status -ne 'Valid') {
              Write-Host "::error::Signature invalid for $($file.Name): $($sig.Status)"
              $allValid = $false
            }
          }
          if (-not $allValid) { exit 1 }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-win-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
          if-no-files-found: error
          retention-days: 7
